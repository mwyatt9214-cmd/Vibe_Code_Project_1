version: "3.9"

# Vibe_Code_Project_1 — full local dev stack

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: vibe_code_project_1_app
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/vibe_code_project_1_db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: vibe_code_project_1_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vibe_code_project_1_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vibe_code_project_1_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres-data:
