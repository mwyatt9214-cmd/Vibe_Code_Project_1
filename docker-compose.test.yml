version: "3.9"

# Isolated test environment for Vibe_Code_Project_1
# Usage: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit

services:
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: vibe_code_project_1_test
    command: >
      sh -c "pip install -r requirements-dev.txt &&
             pytest tests/ --cov=src --cov-report=xml"
    environment:
      - APP_ENV=test
      - DATABASE_URL=postgresql://postgres:postgres@test-db:5432/vibe_code_project_1_testdb
    depends_on:
      test-db:
        condition: service_healthy

  test-db:
    image: postgres:16-alpine
    container_name: vibe_code_project_1_testdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vibe_code_project_1_testdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
