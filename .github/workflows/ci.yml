name: Vibe_Code_Project_1 — CI

on:
  push:
    branches: [main, develop]
    paths:
      - "Vibe_Code_Project_1/**"   # only runs when this project changes
  pull_request:
    branches: [main, develop]
    paths:
      - "Vibe_Code_Project_1/**"

defaults:
  run:
    working-directory: Vibe_Code_Project_1  # all steps run inside the project folder

jobs:

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: Vibe_Code_Project_1/requirements-dev.txt

      - name: Install linters
        run: pip install ruff black mypy

      - name: Ruff
        run: ruff check src/ tests/

      - name: Black
        run: black --check src/ tests/

      - name: Mypy
        run: mypy src/

  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vibe_code_project_1_testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: Vibe_Code_Project_1/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vibe_code_project_1_testdb
        run: pytest tests/ --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: Vibe_Code_Project_1/coverage.xml
          flags: Vibe_Code_Project_1
          fail_ci_if_error: false

  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./Vibe_Code_Project_1
          push: false
          tags: ghcr.io/mwyatt9214-cmd/vibe-code-project-1:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
